name: CI — Tests CESIZen

# Déclenché à chaque push et pull request sur main et develop
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Job 1 : Tests API PHP (PHPUnit) ─────────────────────────────────────────
  api:
    name: API — PHPUnit
    runs-on: ubuntu-latest

    # Service PostgreSQL dédié aux tests (base de données temporaire)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cesizen_test
          POSTGRES_USER: cesizen_user
          POSTGRES_PASSWORD: cesizen_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    # Toutes les commandes s'exécutent depuis le dossier cesizen-api
    defaults:
      run:
        working-directory: cesizen-api

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Installation de PHP 8.4 avec les extensions requises par Symfony
      - name: Installer PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: pgsql, pdo_pgsql, zip

      # Cache des dépendances Composer pour accélérer les runs suivants
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: cesizen-api/vendor
          key: composer-${{ hashFiles('cesizen-api/composer.lock') }}
          restore-keys: composer-

      - name: Installer les dépendances Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # Création du fichier de configuration pour les tests
      # On écrase la DATABASE_URL pour pointer vers la BDD de test du CI
      # Note : 127.0.0.1 obligatoire dans GitHub Actions (pas "localhost")
      - name: Configurer l'environnement de test
        run: |
          cp .env .env.test.local
          echo "DATABASE_URL=postgresql://cesizen_user:cesizen_password@127.0.0.1:5432/cesizen_test" >> .env.test.local
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
        env:
          DATABASE_URL: postgresql://cesizen_user:cesizen_password@127.0.0.1:5432/cesizen_test

      - name: Lancer les tests PHPUnit
        run: vendor/bin/phpunit
        env:
          DATABASE_URL: postgresql://cesizen_user:cesizen_password@127.0.0.1:5432/cesizen_test

  # ─── Job 2 : Qualité code frontend React ─────────────────────────────────────
  app:
    name: App Web — ESLint + TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cesizen-app

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Installer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cesizen-app/package-lock.json

      - name: Installer les dépendances npm
        run: npm ci

      # Vérifie les règles ESLint définies dans eslint.config.js
      - name: Vérifier ESLint
        run: npm run lint

      # Vérifie que TypeScript compile sans erreur (sans produire de fichiers)
      - name: Vérifier TypeScript
        run: npx tsc -b --noEmit

      # Lance les tests unitaires Vitest si présents
      - name: Lancer les tests Vitest
        run: npm test
        continue-on-error: false

  # ─── Job 3 : Vérification TypeScript mobile ──────────────────────────────────
  mobile:
    name: Mobile — TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cesizen-mobile

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Installer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cesizen-mobile/package-lock.json

      - name: Installer les dépendances npm
        run: npm ci

      # Vérifie que TypeScript compile sans erreur
      - name: Vérifier TypeScript
        run: npm run type-check

      # Lance les tests Jest si présents (--passWithNoTests évite l'erreur si aucun test)
      - name: Lancer les tests Jest
        run: npm test
