name: Build — CESIZen

# Déclenché à chaque push sur main ou manuellement depuis GitHub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── Build de l'application React (Vite) ─────────────────────────────────────
  build-app:
    name: Build Web App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cesizen-app

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Installer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cesizen-app/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      # Vite compile TypeScript + bundle tout dans cesizen-app/dist/
      - name: Builder l'application React
        run: npm run build
        env:
          # URL de l'API en production (à adapter selon votre hébergement)
          VITE_API_URL: http://localhost:8080/api

      # Sauvegarde les fichiers buildés comme artifact téléchargeable
      # pendant 7 jours depuis GitHub Actions
      - name: Sauvegarder l'artifact de build
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: cesizen-app/dist
          retention-days: 7

  # ─── Build de l'image Docker API ─────────────────────────────────────────────
  build-api:
    name: Build API Docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Active le builder multi-plateforme Docker Buildx
      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build local uniquement (pas de push vers registry)
      # Pour pousser vers ghcr.io, décommenter les étapes login + push
      - name: Builder l'image Docker PHP-FPM
        uses: docker/build-push-action@v5
        with:
          context: cesizen-api
          file: cesizen-api/docker/php/Dockerfile
          push: false
          tags: cesizen-api:${{ github.sha }},cesizen-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Pour activer le push vers GitHub Container Registry ──────────────
      # Décommenter les étapes suivantes et configurer les secrets GitHub :
      # - GHCR login : username = github.actor, password = secrets.GITHUB_TOKEN
      #
      # - name: Se connecter à GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # Puis remplacer push: false par push: true et ajouter :
      # tags: ghcr.io/charly-brs/cesizen-api:latest
